<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playfair Cipher</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"/>
</head>
<body>
    <div class="container">
        <table class="table">

            <tr>
                <td style="text-align: center; font-weight: bold; font-style: 25px;">
                    PLAYFAIR CIPHER
                </td>
            </tr>

            <tr>
                <td style="font-weight: bold; color: blue;">
                    ENCRYPTION
                </td>
            </tr>

            <tr>
                <td>
                    <form method="POST" action="/playfair/encrypt">

                        <div class="mb-3">
                            <label class="form-label">Plain Text: </label>
                            <input type="text" class="form-control"
                                   name="InputPlainText"
                                   placeholder="Input Plain Text"
                                   required autofocus>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Keyword: </label>
                            <input type="text" class="form-control"
                                   name="InputKeyText"
                                   placeholder="Input Keyword"
                                   required>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            Encrypt
                        </button>

                        <div class="mb-3">
                            <label class="form-label">Cipher Text: </label>
                            <input type="text" class="form-control"
                                   name="output"
                                   value="{{output}}"
                                   readonly>
                        </div>

                    </form>
                </td>
            </tr>

            <tr>
                <td style="font-weight: bold; color: blue;">
                    DECRYPTION
                </td>
            </tr>

            <tr>
                <td>
                    <form method="POST" action="/playfair/decrypt">

                        <div class="mb-3">
                            <label class="form-label">Cipher Text: </label>
                            <input type="text" class="form-control"
                                   name="InputCipherText"
                                   placeholder="Input Cipher Text"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Keyword: </label>
                            <input type="text" class="form-control"
                                   name="InputKeyText"
                                   placeholder="Input Keyword"
                                   required>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            Decrypt
                        </button>

                    </form>
                </td>
            </tr>

        </table>
    </div>
</body>
</html>
